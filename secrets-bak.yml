# Secrets Configuration File
# This file demonstrates all possible features and use cases of the secrets.yml format

# SECTION 1: Metadata (required)
profile: "myproject48"
default_environment: "development"

---
# SECTION 2: Environments (required)
newtesting4:
  - name: "NEW_TEST_VAR"
    type: "envvar"
    entry: "NEW_TEST"
    key: "Password"

newtesting2:
  - name: "NEW_TEST_VAR"
    type: "envvar"
    entry: "NEW_TEST"
    key: "Password"

development3:
  - name: "DATABASE_URL"
    type: "envvar"
    entry: "DATABASE_URL"
    key: "Password"

# Development environment - basic items
development:
  - name: "DATABASE_URL"
    type: "envvar"
    entry: "DATABASE_URL"
    key: "Password"
  
  - name: "API_TOKEN"
    type: "envvar"
    entry: "/tokens/API_TOKEN3"
    key: "Password2"
  
  - name: "API_TOKEN2"
    type: "envvar"
    entry: "/tokens/API_TOKEN4"
    key: "Password56"

  - name: "NEW_FIELD_TEST"
    type: "envvar"
    entry: "/tokens/API_TOKEN4"
    key: "NewTestField4"

  - name: "BRAND_NEW_FIELD"
    type: "envvar"
    entry: "/tokens/API_TOKEN4"
    key: "BrandNewField123"

  - name: "ANOTHER_TEST_FIELD"
    type: "envvar"
    entry: "/tokens/API_TOKEN4"
    key: "AnotherTestField999"

  - name: "FINAL_TEST_FIELD"
    type: "envvar"
    entry: "/tokens/API_TOKEN4"
    key: "FinalTestField555"

  - name: "SSH_KEY"
    type: "ssh_agent"
    entry: "/keys/development_key"
    key: "attachments/id_rsa43321333333"
  
  - name: "Database Info"
    type: "text"
    entry: "DB_INFO"
    key: "Notes"

  - name: "Database_Info2"
    type: "text"
    entry: "DB_INFO"
    key: "Notes"

# Production environment - nested groups and standard fields
production:
  - name: "PROD_DATABASE_URL"
    type: "envvar"
    entry: "/database/production/MAIN_DB"
    key: "Password"
  
  - name: "PROD_USERNAME"
    type: "envvar"
    entry: "/database/production/USER_DB"
    key: "UserName"
  
  - name: "VAULT_TOKEN"
    type: "envvar"
    entry: "/vault/tokens/VAULT_TOKEN"
    key: "Password"
  
  - name: "SSL_CERT"
    type: "ssh_agent"
    entry: "/certificates/ssl/PROD_CERT"
    key: "attachments/certificate.pem"
  
  - name: "SSL_KEY"
    type: "ssh_agent"
    entry: "/certificates/ssl/PROD_KEY"
    key: "attachments/private.key"
  
  - name: "Server Details"
    type: "text"
    entry: "/servers/web/SERVER_INFO"
    key: "Notes"
  
  - name: "BACKUP_URL"
    type: "envvar"
    entry: "/backup/BACKUP_CONFIG"
    key: "URL"

# Staging environment - mixed use cases
staging:
  - name: "STAGING_DB"
    type: "envvar"
    entry: "STAGING_DATABASE"
    key: "Password"
  
  - name: "REDIS_URL"
    type: "envvar"
    entry: "/cache/redis/REDIS_CONFIG"
    key: "Password"
  
  - name: "TEST_KEY"
    type: "ssh_agent"
    entry: "/testing/keys/TEST_SSH"
    key: "attachments/test_key"
  
  - name: "Config File"
    type: "text"
    entry: "/config/APP_CONFIG"
    key: "attachments/config.json"
  
  - name: "Admin Info"
    type: "text"
    entry: "/admin/ADMIN_CONTACT"
    key: "Notes"

# Testing environment - case insensitive standard fields and same entry+key reuse
testing:
  - name: "TEST_USERNAME"
    type: "envvar"
    entry: "TEST_USER_CREDENTIALS"
    key: "username"  # case insensitive, will be stored as "UserName"
  
  - name: "TEST_PASSWORD_ENV"
    type: "envvar"
    entry: "TEST_USER_CREDENTIALS"
    key: "password"  # case insensitive, will be stored as "Password"
  
  - name: "TEST_PASSWORD_DISPLAY"
    type: "text"
    entry: "TEST_USER_CREDENTIALS"
    key: "password"  # Same entry+key as above, but used for text display
  
  - name: "TEST_URL"
    type: "envvar"
    entry: "TEST_CONFIG"
    key: "url"  # case insensitive, will be stored as "URL"
  
  - name: "Backup Script"
    type: "text"
    entry: "/scripts/BACKUP_SCRIPT"
    key: "attachments/backup.sh"

# Local environment - custom fields and multiple attachments
local:
  - name: "LOCAL_SECRET"
    type: "envvar"
    entry: "LOCAL_CONFIG"
    key: "custom_field_1"  # custom field (not standard KeePass field)
  
  - name: "DEV_TOKEN"
    type: "envvar"
    entry: "/development/tokens/DEV_TOKEN"
    key: "api_token"  # custom field
  
  - name: "Multiple Files"
    type: "text"
    entry: "/files/MULTIPLE_FILES"
    key: "attachments/file1.txt"
  
  - name: "Docker Config"
    type: "text"
    entry: "/docker/DOCKER_CONFIG"
    key: "attachments/docker-compose.yml"
  
  - name: "Development Notes"
    type: "text"
    entry: "/notes/DEV_NOTES"
    key: "Notes"

# Demo environment - edge cases and complex paths
demo:
  - name: "COMPLEX_PATH_VAR"
    type: "envvar"
    entry: "/level1/level2/level3/level4/DEEP_ENTRY"
    key: "Password"
  
  - name: "SHARED_PASSWORD_ENV"
    type: "envvar"
    entry: "/shared/SHARED_CREDENTIALS"
    key: "Password"
  
  - name: "SHARED_PASSWORD_TEXT"
    type: "text"
    entry: "/shared/SHARED_CREDENTIALS"
    key: "Password"
  
  - name: "SHARED_USERNAME"
    type: "envvar"
    entry: "/shared/SHARED_CREDENTIALS"
    key: "UserName"
  
  - name: "Certificate Bundle"
    type: "ssh_agent"
    entry: "/certificates/bundle/CERT_BUNDLE"
    key: "attachments/ca-bundle.crt"
  
  - name: "Complex Config"
    type: "text"
    entry: "/complex/config/COMPLEX_CONFIG"
    key: "attachments/complex-config.yaml"

---
# SECTION 3: Reserved Section (for future functionality)
# This section is currently reserved for future features
# Content structure to be defined in future versions
reserved_section:
  placeholder: "Reserved for future functionality"
