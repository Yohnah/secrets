# secrets.yml - Minimal template
# Copy and customize for your project
# This template contains three sections:

# secrets.yml - Complete template with examples
# This template shows placeholders and examples in comments

metadata:
  # Profile name - creates a group in KeePass database on root level with this name
  profile: "profile-name"  # Example: "my-project", "api-service"
  
  # Default environment when none is specified
  default_environment: "environment_name"      # Example: "development", "staging"
---
# Environment configurations
# Each environment contains a list of secrets to be extracted

environment_name:                               # Example: development, staging, production
  # Basic environment variable from KeePass field
  - name: "ITEM_NAME"                         # Example: DATABASE_URL, API_KEY
    entry: "/path/to/entry"                  # Example: "/databases/dev/main", "/api/keys"
    key: "entry_field_name"                  # Example: "password", "connection_string", "token". If using attachments, use "attachments/filename.ext"
    type: "(envvar|ssh_agent)"               # Type: envvar for environment variables or ssh_agent for SSH keys


