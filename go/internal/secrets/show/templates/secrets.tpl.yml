# ===============================================================================
# SECRETS.YML TEMPLATE
# ===============================================================================
# This file defines the structure and mapping of secrets for your project.
# It should be versioned in Git (does NOT contain actual secrets).
#
# Multiple profiles can be defined in this file, separated by "---"
# Each profile represents a different configuration set.
# ===============================================================================

metadata:
  # Unique profile name (must be unique across all profiles in this file)
  profile: "<your-profile-name>"
  
  # Default environment to use when no environment is specified
  default_environment: "<your-default-environment>"

# Define different environments and their secret mappings
environments:
  
  # Environment name (e.g., production, development, staging, testing)
  <environment-name>:
    # Item definition
    - name: "<ITEM_NAME>"              # Unique identifier (no spaces, no special chars)
      type: "<type>"                   # envvar | text | ssh_agent
      entry: "/<path/to/entry>"        # Path in KeePass (must start with /)
      key: "<field-name>"              # Field name or attachments/<filename>

# Reserved for future use (can be empty or omitted)
outputs: {}


