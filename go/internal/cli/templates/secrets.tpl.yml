# SECRETS.YML TEMPLATE
# This template shows the required structure for secrets.yml file
# Replace placeholders with your actual values

# =============================================================================
# SECTION 1: METADATA (Global Configuration) - REQUIRED
# =============================================================================
profile: "YOUR_PROFILE_NAME"           # REQUIRED: Name of your profile (becomes KeePass root group)
default_environment: "YOUR_DEFAULT_ENV" # REQUIRED: Default environment name

---

# =============================================================================
# SECTION 2: ENVIRONMENTS (Secret Definitions) - REQUIRED
# =============================================================================

# Replace "your_environment_name" with your actual environment names
# You can have as many environments as needed (development, production, staging, etc.)
your_environment_name:
  - name: "YOUR_VARIABLE_NAME"        # REQUIRED: Name for this secret
    type: "envvar"                    # REQUIRED: envvar, text, or ssh_agent
    entry: "YOUR_ENTRY_NAME"          # REQUIRED: Entry name in KeePass
    key: "Password"                   # REQUIRED: Field name in KeePass entry

# EXAMPLES (remove these comments and customize for your needs):
#
# development:
#   - name: "DATABASE_URL"            # Environment variable name
#     type: "envvar"                  # Type: envvar, text, ssh_agent  
#     entry: "DATABASE_URL"           # Entry name in KeePass (or /path/to/entry)
#     key: "Password"                 # Field name in KeePass entry
#
#   - name: "API_TOKEN"
#     type: "envvar"
#     entry: "/api/tokens/MAIN_TOKEN" # Creates subgroups: api/tokens/MAIN_TOKEN
#     key: "Password"
#
#   - name: "SSH_KEY"
#     type: "ssh_agent"
#     entry: "SSH_PRIVATE_KEY"
#     key: "attachments/id_rsa"       # File attachment in KeePass
#
#   - name: "Database Info"
#     type: "text"                    # Will be displayed as text
#     entry: "DB_INFO"
#     key: "Notes"
#
# production:
#   - name: "DATABASE_URL"
#     type: "envvar"
#     entry: "PROD_DATABASE_URL"
#     key: "Password"
#
# staging:
