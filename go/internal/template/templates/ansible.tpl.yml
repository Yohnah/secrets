# ============================================================================
# Ansible Variables Template
# ----------------------------------------------------------------------------
# This template generates an Ansible variables file (YAML format) that can
# be included in Ansible playbooks or roles. It creates variables from secrets
# that can be referenced in Ansible tasks and templates.
#
# Usage:
#   - Include this file in your Ansible roles or playbooks using vars_files
#   - Reference variables in tasks: {{ db_password }}
#   - Use in templates with Jinja2: {{ db_password }}
#   - The template expects data with: { Items: map[string]string }
#   - Example output creates Ansible variables for database and API access
#
# Security:
#   - Variables contain actual secret values when processed
#   - Use Ansible Vault for encryption in production
#   - Do NOT commit generated files with real secrets to version control
#
# ----------------------------------------------------------------------------
# Template logic:
#   - Iterates over .Items map, creating YAML key-value pairs
#   - Uses YAML syntax compatible with Ansible variable files
# ============================================================================

{{range $key, $value := .Items}}
{{$key}}: "{{$value}}"
{{end}}
