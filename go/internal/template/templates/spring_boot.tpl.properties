# ============================================================================
# Spring Boot Properties Template
# ----------------------------------------------------------------------------
# This template generates a Spring Boot application.properties or
# application-{profile}.properties file. It creates property key-value pairs
# that can be accessed in Spring Boot applications via @Value annotations
# or Environment objects.
#
# Usage:
#   - Place in src/main/resources/ as application.properties
#   - Access in code: @Value("${spring.datasource.password}")
#   - Use profiles: application-production.properties
#   - The template expects data with: { Items: map[string]string }
#   - Example output creates Spring Boot configuration properties
#
# Security:
#   - Properties files may contain sensitive configuration data
#   - Use Spring Cloud Config or external configuration for production
#   - Do NOT commit generated files with real secrets to version control
#
# ----------------------------------------------------------------------------
# Template logic:
#   - Iterates over .Items map, creating key=value pairs
#   - Uses standard Java properties format
# ============================================================================

# Spring Boot application properties
{{range $key, $value := .Items}}
{{$key}}={{$value}}
{{end}}
