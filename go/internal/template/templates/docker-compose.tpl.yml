{{- /* 
============================================================================
Docker Compose Environment Template
----------------------------------------------------------------------------
This template generates a Docker Compose override file with environment
variables. It creates environment variable assignments that can be used
to inject secrets into Docker containers.

Usage:
  - Use as docker-compose.override.yml or include in docker-compose.yml
  - Variables are automatically available in containers as environment vars
  - The template expects data with: { Items: map[string]string }
  - Example output creates environment variables for containerized apps

Security:
  - Environment variables are visible in container environments
  - Use Docker secrets for sensitive data in production
  - Do NOT commit generated files with real secrets to version control

----------------------------------------------------------------------------
Template logic:
  - Creates a basic docker-compose structure with services.app.environment
  - Iterates over .Items map, creating environment variable assignments
============================================================================
*/ -}}

version: '3.8'
services:
  app:
    environment:
{{range $key, $value := .Items}}      - {{$key}}={{$value}}
{{end}}
