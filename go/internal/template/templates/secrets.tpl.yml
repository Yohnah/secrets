# ===============================================================================
# FIELD REFERENCE
# ===============================================================================
#
# ITEM FIELDS:
#   - name:  Unique identifier within the environment (no spaces, no special chars)
#   - type:  Type of secret injection
#            * envvar:    Environment variable (behavior TBD)
#            * sshkey:    SSH key (behavior TBD)
#   - entry: Path to entry in KeePass database
#            * Must start with "/"
#            * Format: /EntryName or /Group1/Group2/EntryName
#            * Case-sensitive
#   - key:   Field name within the KeePass entry
#            * Standard fields (case-insensitive): Title, UserName, Password, URL, Notes
#            * Custom fields: Any name (case-sensitive)
#            * Attachments: attachments/<filename>
#
# VALIDATION RULES:
#   - Profile names must be unique in the file
#   - Environment names must be unique within each profile
#   - Item names must be unique within each environment
#   - Multiple items CAN point to the same entry (different keys)
#   - Multiple items CAN use the same key (different entries)
#
# EXAMPLES:
#
#   Standard field (case-insensitive):
#     key: "Password"    # or "password", "PASSWORD", "pAsSwOrD"
#     key: "UserName"    # or "username", "USERNAME", "uSeRnAmE"
#
#   Custom field:
#     key: "api_token"
#     key: "database_host"
#     key: "smtp_port"
#
#   Attachment:
#     key: "attachments/id_rsa"
#     key: "attachments/certificate.pem"
#     key: "attachments/config.json"
#
# ===============================================================================
#
# OUTPUT TYPES REFERENCE
# ===============================================================================
#
# OUTPUTS SECTION:
#   Define how secrets should be exported to various file formats.
#   This section is optional - can be empty list [] or omitted entirely.
#   Format: List of output configurations (flat structure)
#
# OUTPUT TYPES:
#
#   dotenv:
#     Purpose: Generate .env files for environment variables
#     Required fields: file, environment, format
#     Example:
#       - file: ".env.production"
#         environment: "production"
#         format: "dotenv"
#
#   dotnet:
#     Purpose: Generate .NET appsettings JSON files
#     Required fields: file, environment, format
#     Example:
#       - file: "appsettings.Production.json"
#         environment: "production"
#         format: "dotnet"
#
#   spring_boot:
#     Purpose: Generate Spring Boot properties files
#     Required fields: file, environment, format
#     Example:
#       - file: "application-production.properties"
#         environment: "production"
#         format: "spring_boot"
#
#   terraform:
#     Purpose: Generate Terraform variable files (.tfvars)
#     Required fields: file, environment, format
#     Example:
#       - file: "production.tfvars"
#         environment: "production"
#         format: "terraform"
#
#   shell:
#     Purpose: Generate shell scripts for exporting environment variables
#     Required fields: file, environment, format
#     Format values: bash | zsh | fish | sh | powershell
#     Example:
#       - file: "set-env.bash"
#         environment: "production"
#         format: "bash"
#
#   ansible:
#     Purpose: Generate Ansible inventory or variable files
#     Required fields: file, environment, format
#     Example:
#       - file: "inventory/production.yml"
#         environment: "production"
#         format: "ansible"
#
#   docker-compose:
#     Purpose: Generate Docker Compose override files
#     Required fields: file, environment, format
#     Example:
#       - file: "docker-compose.override.yml"
#         environment: "production"
#         format: "docker-compose"
#
#   k8s:
#     Purpose: Generate Kubernetes secrets YAML files
#     Required fields: file, environment, format
#     Example:
#       - file: "k8s/production-secrets.yaml"
#         environment: "production"
#         format: "k8s"
#
#   ini:
#     Purpose: Generate INI configuration files
#     Required fields: file, environment, format
#     Optional fields: section_by
#     section_by values: environment | default | custom:<name>
#     Example:
#       - file: "config.ini"
#         environment: "production"
#         format: "ini"
#         section_by: "environment"  # Creates [production] section
#       - file: "config.ini"
#         environment: "production"
#         format: "ini"
#         section_by: "default"      # Creates [DEFAULT] section
#       - file: "config.ini"
#         environment: "production"
#         format: "ini"
#         section_by: "custom:database"  # Creates [database] section
#
#   toml:
#     Purpose: Generate TOML configuration files
#     Required fields: file, environment, format
#     Optional fields: section_by
#     section_by values: environment | custom:<name>
#     Example:
#       - file: "config.toml"
#         environment: "production"
#         format: "toml"
#         section_by: "environment"  # Creates [production] table
#       - file: "config.toml"
#         environment: "production"
#         format: "toml"
#         section_by: "custom:database"  # Creates [database] table
#
#   yaml:
#     Purpose: Generate YAML configuration files
#     Required fields: file, environment, format
#     Optional fields: section_by
#     section_by values: environment | custom:<name>
#     Example:
#       - file: "config.yaml"
#         environment: "production"
#         format: "yaml"
#         section_by: "environment"  # Creates production: mapping
#       - file: "config.yaml"
#         environment: "production"
#         format: "yaml"
#         section_by: "custom:api"  # Creates api: mapping
#
#   json:
#     Purpose: Generate JSON configuration files
#     Required fields: file, environment, format
#     Optional fields: section_by
#     section_by values: custom:<name> (defaults to flat structure)
#     Example:
#       - file: "config.json"
#         environment: "production"
#         format: "json"
#         section_by: "custom:config"  # Creates {"config": {...}} structure
#
#   custom:
#     Purpose: Generate custom format files using user-provided templates
#     Required fields: file, environment, format, template
#     Template: Path to template file (relative or absolute)
#     Example:
#       - file: "custom-output.txt"
#         environment: "production"
#         format: "custom"
#         template: "templates/custom.tpl"
#
# VALIDATION RULES FOR OUTPUTS:
#   - Outputs is a list of output configurations (flat structure)
#   - Each item must have required fields for its format
#   - File paths must be unique across all output items
#   - Environment must exist in the environments section
#   - Shell format must be one of: bash, zsh, fish, sh, powershell
#   - Custom template must point to an existing file
#
# ===============================================================================
# VOLUME TYPES REFERENCE
# ===============================================================================
#
# VOLUME TYPES:
#   - tmpfs:    Temporary file system in memory
#   - bind:     Bind mount from host filesystem
#   - volume:   Docker-style named volume
#   - nfs:      Network File System mount
#
# VOLUME FIELDS:
#   - name:         Unique identifier for the volume
#   - mount_path:   Path where the volume will be mounted
#   - environment:  Environment where this volume applies
#   - type:         Type of volume (see VOLUME TYPES above)
#
# VALIDATION RULES FOR VOLUMES:
#   - Volumes is a list of volume configurations (flat structure)
#   - Each volume must have name, mount_path, environment, and type
#   - Volume names must be unique across all volume items
#   - Environment must exist in the environments section
#   - Mount paths must be absolute paths (start with /)
#   - Volume type must be one of the supported types
#   - section_by is optional and format-specific
#   - For ini: section_by can be "environment", "default", or "custom:<name>"
#   - For toml/yaml: section_by can be "environment" or "custom:<name>"
#   - For json: section_by can be "custom:<name>" (optional)
#
# ===============================================================================

