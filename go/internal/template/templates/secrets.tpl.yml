# ============================================================================
# Secrets Configuration Template
# ----------------------------------------------------------------------------
# This file defines the structure and mapping of secrets for your project.
# It should be versioned in Git (does NOT contain actual secrets).
#
# Multiple profiles can be defined in this file, separated by "---"
# Each profile represents a different configuration set.
#
# Usage:
#   - Copy this template to create your secrets.yml file
#   - Replace placeholder values with your actual KeePass paths and field names
#   - Define environments and their secret mappings
#   - Configure outputs for different formats (.env files, etc.)
#
# Security:
#   - This file contains structure only, not actual secret values
#   - Safe to commit to version control
#   - Actual secrets remain encrypted in KeePass database
#
# ----------------------------------------------------------------------------
# Template logic:
#   - Defines profile metadata and environment configurations
#   - Maps KeePass entries to environment variables or files
#   - Supports multiple output formats and destinations
# ============================================================================

metadata:
  # Unique profile name (must be unique across all profiles in this file)
  profile: "<your-profile-name>"

# Define different environments and their secret mappings
environments:
  
  # Environment name (e.g., production, development, staging, testing)
  <environment-name>:
    # Item definition
    - name: "<ITEM_NAME>"              # Unique identifier (no spaces, no special chars)
      type: "<type>"                   # envvar | sshkey
      entry: "/<path/to/entry>"        # Path in KeePass (must start with /)
      key: "<field-name>"              # Field name or attachments/<filename>

# Output configurations (optional - can be empty or omitted)
outputs:
  # Example output (remove or modify as needed)
  - file: "<output-file>"
    environment: "<environment-name>"
    format: "<format>"                 # See OUTPUT TYPES REFERENCE below

# Volume configurations (optional - can be empty or omitted)
volumes:
  # Example volume (remove or modify as needed)
  - name: "<volume-name>"
    mount_path: "<mount-path>"
    environment: "<environment-name>"
    type: "<volume-type>"              # See VOLUME TYPES REFERENCE below


