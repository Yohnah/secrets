metadata:
  profile: "myapp-production"
  default_environment: "production"

environments:
  production:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Production/DB"
      key: "Password"
    - name: "API_TOKEN"
      type: "envvar"
      entry: "/Production/API"
      key: "Token"
    - name: "SSH_KEY"
      type: "ssh_agent"
      entry: "/Production/SSH"
      key: "attachments/id_rsa"

  staging:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Staging/DB"
      key: "Password"

outputs: {}
