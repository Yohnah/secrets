metadata:
  profile: "test-outputs"

environments:
  production:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Production/Database"
      key: "Password"
  
  staging:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Staging/Database"
      key: "Password"

outputs:
  - file: ".env.production"
    environment: "production"
    format: "dotenv"
  - file: ".env.staging"
    environment: "staging"
    format: "dotenv"
  - file: "appsettings.Production.json"
    environment: "production"
    format: "dotnet"
  - file: "set-env.bash"
    environment: "production"
    format: "shell"
  - file: "set-env.fish"
    environment: "staging"
    format: "shell"
  - file: "production.tfvars"
    environment: "production"
    format: "terraform"
