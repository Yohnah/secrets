metadata:
  profile: "myapp"
  default_environment: "production"

environments:
  production:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Production/DB"
      key: "Password"
  
  production:
    - name: "API_KEY"
      type: "envvar"
      entry: "/Production/API"
      key: "Token"

outputs: {}
