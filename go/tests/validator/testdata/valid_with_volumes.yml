metadata:
  profile: "test-volumes"

environments:
  production:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Database"
      key: "Password"

volumes:
  - name: "data-volume"
    mount_path: "/var/lib/data"
    environment: "production"
    type: "tmpfs"
  - name: "logs-volume"
    mount_path: "/var/log/app"
    environment: "production"
    type: "bind"