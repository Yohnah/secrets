metadata:
  profile: "test-volumes"
  basedirs:
    production: "data-volume"

environments:
  production:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Database"
      key: "Password"

volumes:
  - name: "data-volume"
    mount_path: "/var/lib/data"
    type: "dir"
  - name: "logs-volume"
    mount_path: "/var/log/app"
    type: "dir"