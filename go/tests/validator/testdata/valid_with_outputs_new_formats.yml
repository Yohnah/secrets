metadata:
  profile: "test-new-formats"

environments:
  production:
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Production/Database"
      key: "Password"

outputs:
  - file: "config.ini"
    environment: "production"
    format: "ini"
    section_by: "environment"
  - file: "config.toml"
    environment: "production"
    format: "toml"
    section_by: "default"
  - file: "config.yaml"
    environment: "production"
    format: "yaml"
    section_by: "custom:secrets"
  - file: "config.json"
    environment: "production"
    format: "json"
