# ===============================================================================
# SECRETS.YML - Real-world example for testing
# ===============================================================================
# This file contains example profiles for development and testing.
# It should be versioned in Git (does NOT contain actual secrets).
# ===============================================================================

# Production profile - Web application with database and external services
profile:                                          # Required section
  name: "<profile-name>"                          # Required
  description: "dfasfa"                 
  
  defaults:                                       # Optional, define de default values for others sections, if the values are set in the specific sections, those values set have priority
    output:                                       # Optional, define the default values for output section
      template_options:                           # Optional, define the default value for template section
        format: "dontenv"                         # Optional, default value is "dotenv" if it is not set
        file: ".{{ @current.output.name }}"       # Optional, default value is the name of correspondient output if it is not set
        data: "{{ @current.context.items }}"      # Optional, default value is list of preprocesed Items of contexts

      file_options:
        filename: null
        line_ending: "lf"
        file_mode: "0644"
        gitignore: false
        append_mode: false
  
      ssh_agent:
        agent: "both"
        passphrase_handling: "item"
        key_lifetime: "3600"
        remove_existing: true

contexts:
  <context-name>:
    - name: "<item-name>"
      alias: []
      type: "<type>" # text, sshkey
      entry: "</path/to/entry/on/database>"
      field: "<field name on entry>"


outputs:
  - name: "<name of output>" # required.
    write_to: "<type of output>" # required. e.g., "file", "screen", "ssh_agent"
    contexts: # required at least a one context must be listed
      - "<context name>" # e.g., "production", "staging", "qa"
    items: # required at leas one item must be listed
      - "<item name>" # e.g., "DB_HOST", "DB_PASSWORD"
    #the options set on default subsection defined here will override the defaults options