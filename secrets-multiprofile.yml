# ===============================================================================
# SECRETS.YML - Real-world example for testing
# ===============================================================================
# This file contains example profiles for development and testing.
# It should be versioned in Git (does NOT contain actual secrets).
# ===============================================================================

# Production profile - Web application with database and external services
metadata:
  profile: "webapp-production"
  default_environment: "production"

environments:
  
  production:
    # PostgreSQL Database
    - name: "DB_HOST10"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL10030"
      key: "attachments/ficherito.txt"
  
    # PostgreSQL Database
    - name: "DB_HOST"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL"
      key: "host"

    - name: "DB_HOST2"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL2"
      key: "host"
    
    # NUEVO: Agregado DB_HOST3 con nueva entrada
    - name: "DB_HOST3"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL3"
      key: "host"

    - name: "DB_PORT"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL"
      key: "port"
    
    - name: "DB_NAME"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL"
      key: "database"
    
    - name: "DB_USERNAME"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL"
      key: "UserName"
    
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Production/Database/PostgreSQL"
      key: "Password"
    
    # Redis Cache - RENOMBRADO: /Production/Cache/Redis -> /Production/Cache/RedisCluster
    - name: "REDIS_URL"
      type: "envvar"
      entry: "/Production/Cache/RedisCluster"
      key: "URL"
    
    - name: "REDIS_PASSWORD"
      type: "envvar"
      entry: "/Production/Cache/RedisCluster"
      key: "Password"
    
    # NUEVO: Agregado Memcached
    - name: "MEMCACHED_URL"
      type: "envvar"
      entry: "/Production/Cache/Memcached"
      key: "URL"
    
    # External APIs
    - name: "STRIPE_API_KEY"
      type: "envvar"
      entry: "/Production/API/Stripe"
      key: "api_key"
    
    - name: "SENDGRID_API_KEY"
      type: "envvar"
      entry: "/Production/API/SendGrid"
      key: "api_key"
    
    # NUEVO: Agregado Twilio API
    - name: "TWILIO_API_KEY"
      type: "envvar"
      entry: "/Production/API/Twilio"
      key: "api_key"
    
    - name: "AWS_ACCESS_KEY_ID"
      type: "envvar"
      entry: "/Production/Cloud/AWS"
      key: "access_key_id"
    
    - name: "AWS_SECRET_ACCESS_KEY"
      type: "envvar"
      entry: "/Production/Cloud/AWS"
      key: "secret_access_key"
  
  staging:
    # Staging uses same structure but different KeePass paths
    - name: "DB_HOST"
      type: "envvar"
      entry: "/Staging/Database/PostgreSQL"
      key: "host"
    
    - name: "DB_USERNAME"
      type: "envvar"
      entry: "/Staging/Database/PostgreSQL"
      key: "UserName"
    
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Staging/Database/PostgreSQL"
      key: "Password"
    
    # NUEVO: Agregado Redis en staging
    - name: "REDIS_URL"
      type: "envvar"
      entry: "/Staging/Cache/Redis"
      key: "URL"
  
  # NUEVO ENVIRONMENT: qa (Quality Assurance)
  qa:
    - name: "DB_HOST"
      type: "envvar"
      entry: "/QA/Database/PostgreSQL"
      key: "host"
    
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/QA/Database/PostgreSQL"
      key: "Password"
    
    - name: "TEST_API_KEY"
      type: "envvar"
      entry: "/QA/API/TestService"
      key: "api_key"

outputs:
  sockets:
    - type: "unix"
      uri: "unix:///var/run/webapp.sock"
      environment: "production"
    - type: "tcp"
      uri: "tcp://0.0.0.0:8080"
      environment: "production"
  dotenvs:
    - file: ".env.production"
      environment: "production"

---

# Development profile - Simplified for local development
metadata:
  profile: "webapp-development"
  default_environment: "development"

environments:
  
  development:
    # Local database
    - name: "DB_HOST"
      type: "envvar"
      entry: "/Development/Database"
      key: "host"
    
    - name: "DB_USERNAME"
      type: "envvar"
      entry: "/Development/Database"
      key: "UserName"
    
    - name: "DB_PASSWORD"
      type: "envvar"
      entry: "/Development/Database"
      key: "Password"
    
    # NUEVO: Agregado DB_PORT en development
    - name: "DB_PORT"
      type: "envvar"
      entry: "/Development/Database"
      key: "port"
    
    # Test API keys - RENOMBRADO: /Development/API/Stripe -> /Development/API/StripeTest
    - name: "STRIPE_TEST_KEY"
      type: "envvar"
      entry: "/Development/API/StripeTest"
      key: "test_key"
    
    # NUEVO: Agregado PayPal test
    - name: "PAYPAL_TEST_KEY"
      type: "envvar"
      entry: "/Development/API/PayPalTest"
      key: "test_key"

outputs: {}

---

# NUEVO PROFILE COMPLETO: Mobile App Backend
metadata:
  profile: "mobile-backend"
  default_environment: "production"

environments:
  
  production:
    # Firebase credentials
    - name: "FIREBASE_API_KEY"
      type: "envvar"
      entry: "/Production/Mobile/Firebase"
      key: "api_key"
    
    - name: "FIREBASE_PROJECT_ID"
      type: "envvar"
      entry: "/Production/Mobile/Firebase"
      key: "project_id"
    
    # Push notifications
    - name: "FCM_SERVER_KEY"
      type: "envvar"
      entry: "/Production/Mobile/FCM"
      key: "server_key"
    
    - name: "APNS_CERTIFICATE"
      type: "envvar"
      entry: "/Production/Mobile/APNS"
      key: "certificate"
  
  development:
    - name: "FIREBASE_API_KEY"
      type: "envvar"
      entry: "/Development/Mobile/Firebase"
      key: "api_key"

outputs: {}
