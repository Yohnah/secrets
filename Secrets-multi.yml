profile:
  name: "development"
  description: "Development environment with local services"
  
  defaults:
    output:
      template_options:
        format: "dotenv"
      file_options:
        filename: ".{{ @current.output.name }}"
        line_ending: "lf"
        gitignore: true

contexts:
  database:
    items:
      - name: "DB_HOST"
        entry: "/Database/Local/postgres"
        field: "URL"
      
      - name: "DB_PASSWORD"
        entry: "/Database/Local/postgres"
        field: "Password"
      
      - name: "CACHE_HOST"
        entry: "/Cache/Local/redis"
        field: "URL"
  
  api:
    items:
      - name: "API_KEY"
        alias: ["DEV_API_KEY"]
        entry: "/API/Development/test_key"
        field: "api_key"

outputs:
  - name: "env"
    write_to: "file"
    contexts: ["database", "api"]
    items: ["DB_HOST", "DB_PASSWORD", "CACHE_HOST", "API_KEY"]

---
profile:
  name: "staging"
  description: "Staging environment for pre-production testing"
  
  defaults:
    output:
      file_options:
        line_ending: "lf"
        file_mode: "0600"

contexts:
  database:
    items:
      - name: "DB_HOST"
        entry: "/Database/Staging/postgres"
        field: "URL"
      
      - name: "DB_USER"
        entry: "/Database/Staging/postgres"
        field: "UserName"
      
      - name: "DB_PASSWORD"
        entry: "/Database/Staging/postgres"
        field: "Password"
      
      - name: "DB_SSL_CERT"
        entry: "/Database/Staging/postgres"
        field: "attachment/client-cert.pem"
  
  storage:
    items:
      - name: "S3_ACCESS_KEY"
        entry: "/AWS/Staging/s3"
        field: "UserName"
      
      - name: "S3_SECRET_KEY"
        entry: "/AWS/Staging/s3"
        field: "Password"
      
      - name: "S3_BUCKET"
        entry: "/AWS/Staging/s3"
        field: "bucket_name"
  
  ssh:
    items:
      - name: "DEPLOY_KEY"
        entry: "/SSH/Staging/deployment"
        field: "attachment/id_ed25519"
        type: "sshkey"

outputs:
  - name: "database"
    write_to: "file"
    contexts: ["database"]
    items: ["DB_HOST", "DB_USER", "DB_PASSWORD"]
    file_options:
      filename: ".env.staging.db"
  
  - name: "storage"
    write_to: "file"
    contexts: ["storage"]
    items: ["S3_ACCESS_KEY", "S3_SECRET_KEY", "S3_BUCKET"]
    file_options:
      filename: ".env.staging.s3"

---
profile:
  name: "production"
  description: "Production environment - handle with care"
  
  defaults:
    output:
      file_options:
        line_ending: "lf"
        file_mode: "0400"
        gitignore: true
      ssh_agent:
        agent: "both"
        key_lifetime: "1800"

contexts:
  database:
    items:
      - name: "PRIMARY_DB_HOST"
        alias: ["DB_HOST", "POSTGRES_HOST"]
        entry: "/Production/Database/Primary/postgres"
        field: "URL"
      
      - name: "PRIMARY_DB_USER"
        alias: ["DB_USER"]
        entry: "/Production/Database/Primary/postgres"
        field: "UserName"
      
      - name: "PRIMARY_DB_PASSWORD"
        alias: ["DB_PASSWORD"]
        entry: "/Production/Database/Primary/postgres"
        field: "Password"
      
      - name: "REPLICA_DB_HOST"
        entry: "/Production/Database/Replica/postgres"
        field: "URL"
      
      - name: "REDIS_MASTER_HOST"
        entry: "/Production/Cache/Redis/master"
        field: "URL"
      
      - name: "REDIS_MASTER_PASSWORD"
        entry: "/Production/Cache/Redis/master"
        field: "Password"
  
  api:
    items:
      - name: "STRIPE_LIVE_KEY"
        entry: "/Production/External/Stripe/live"
        field: "secret_key"
      
      - name: "STRIPE_WEBHOOK_SECRET"
        entry: "/Production/External/Stripe/live"
        field: "webhook_secret"
      
      - name: "GITHUB_PAT"
        entry: "/Production/External/GitHub/app"
        field: "token"
  
  security:
    items:
      - name: "JWT_SECRET"
        entry: "/Production/Security/JWT/primary"
        field: "Password"
      
      - name: "ENCRYPTION_KEY"
        entry: "/Production/Security/Encryption/aes256"
        field: "key"
      
      - name: "TLS_CERT"
        entry: "/Production/Security/TLS/wildcard"
        field: "attachment/fullchain.pem"
      
      - name: "TLS_KEY"
        entry: "/Production/Security/TLS/wildcard"
        field: "attachment/privkey.pem"
  
  ssh:
    items:
      - name: "DEPLOY_PRIVATE_KEY"
        entry: "/Production/SSH/deployment"
        field: "attachment/id_rsa"
        type: "sshkey"
      
      - name: "DEPLOY_KEY_PASSPHRASE"
        entry: "/Production/SSH/deployment"
        field: "Password"
        type: "text"

outputs:
  - name: "database_primary"
    write_to: "file"
    contexts: ["database"]
    items: ["PRIMARY_DB_HOST", "PRIMARY_DB_USER", "PRIMARY_DB_PASSWORD", "REDIS_MASTER_HOST", "REDIS_MASTER_PASSWORD"]
    file_options:
      filename: ".env.prod.db"
      file_mode: "0400"
  
  - name: "api_secrets"
    write_to: "file"
    contexts: ["api", "security"]
    items: ["STRIPE_LIVE_KEY", "STRIPE_WEBHOOK_SECRET", "GITHUB_PAT", "JWT_SECRET", "ENCRYPTION_KEY"]
    file_options:
      filename: ".env.prod.api"
      file_mode: "0400"
  
  - name: "deploy_key"
    write_to: "ssh_agent"
    contexts: ["ssh"]
    items: ["DEPLOY_PRIVATE_KEY"]
    ssh_agent:
      agent: "ssh-agent"
      passphrase_handling: "item"
      key_lifetime: "1800"
