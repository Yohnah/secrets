version: '3'

vars:
  APP_NAME: secrets
  GO_DIR: ./go
  CMD_DIR: ./go/cmd/{{.APP_NAME}}
  BIN_DIR: ./bin
  DIST_DIR: ./dist
  TRASH_DIR: ./.trash
  VERSION:
    sh: go run ./tools/versioninfo/main.go --field version
  BUILD_TIME:
    sh: go run ./tools/versioninfo/main.go --field build-time
  GIT_COMMIT:
    sh: go run ./tools/versioninfo/main.go --field commit
  LDFLAGS: >-
    -X github.com/Yohnah/secrets/internal/cli.Version={{.VERSION}} -X github.com/Yohnah/secrets/internal/cli.BuildTime={{.BUILD_TIME}} -X github.com/Yohnah/secrets/internal/cli.GitCommit={{.GIT_COMMIT}}
  BUILD_FLAGS: >-
    -ldflags "{{.LDFLAGS}}" -trimpath
  GOCMD: go
  GOBUILD: go build
  GOTEST: go test
  GOVET: go vet
  GOMOD: go mod
  # Auto-detect current OS and architecture
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  # Binary naming for current platform
  BINARY_NAME: '{{.APP_NAME}}-{{.GOOS}}-{{.GOARCH}}{{if eq .GOOS "windows"}}.exe{{end}}'
  BINARY_PATH: '{{.BIN_DIR}}/{{.BINARY_NAME}}'
  # Symlink naming (Unix-like only)
  SYMLINK_NAME: '{{.APP_NAME}}{{if eq .GOOS "windows"}}.exe{{end}}'
  SYMLINK_PATH: '{{.BIN_DIR}}/{{.SYMLINK_NAME}}'

tasks:
  default:
    desc: Show available commands with descriptions
    cmds:
      - task --list
    silent: true

  install-deps:
    desc: Install Go dependencies (for build/CI/CD)
    cmds:
      - echo "Installing Go dependencies..."
      - task: install-go-dependencies
      - echo "Dependencies installed successfully"

  build:
    desc: Build the secrets binary for current platform
    deps:
      - task: create-dir
        vars:
          PATH: "{{.BIN_DIR}}"
    cmds:
      - task: build-binary
      - task: create-symlink-unix
      - task: create-symlink-windows
    sources:
      - '{{.GO_DIR}}/**/*.go'
    generates:
      - '{{.BINARY_PATH}}'

  build-binary:
    internal: true
    desc: Compile binary for current OS and architecture
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Building {{.BINARY_NAME}}..."'
      - cmd: '{{.GOCMD}} build {{.BUILD_FLAGS}} -o ../{{.BINARY_PATH}} ./cmd/{{.APP_NAME}}'
      - cmd: 'echo "✓ Binary built: {{.BINARY_PATH}}"'

  create-symlink-unix:
    internal: true
    desc: Create symlink for Unix-like systems
    platforms: [linux, darwin]
    dir: "{{.BIN_DIR}}"
    cmds:
      - cmd: 'ln -sf {{.BINARY_NAME}} {{.SYMLINK_NAME}}'
      - cmd: 'echo "✓ Symlink created: {{.SYMLINK_NAME}} -> {{.BINARY_NAME}}"'

  create-symlink-windows:
    internal: true
    desc: Windows does not create symlink (requires elevated privileges)
    platforms: [windows]
    cmds:
      - cmd: 'echo "ℹ Windows: Use {{.BINARY_PATH}} directly (symlinks require admin privileges)"'
    silent: true

  tests:
    desc: Run all tests with verbose output and colors
    deps: [install-deps]
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Running all tests..."'
      - cmd: '{{.GOTEST}} -json ./... | tparse -all'
      - cmd: 'echo "Running go vet..."'
      - cmd: '{{.GOVET}} ./...'
      - cmd: 'echo "Running security checks..."'
      - cmd: 'govulncheck ./...'
      - cmd: 'echo "✓ All tests, vet checks and security checks completed successfully"'

  security-check:
    desc: Run security checks (vulnerability scanning)
    deps: [install-deps]
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Running security checks..."'
      - cmd: 'govulncheck ./...'
      - cmd: 'echo "✓ Security checks completed"'

  show-vars:
    desc: Show all global variables (useful for debugging)
    silent: true
    cmds:
      - echo "APP_NAME = {{.APP_NAME}}"
      - echo "GO_DIR = {{.GO_DIR}}"
      - echo "BIN_DIR = {{.BIN_DIR}}"
      - echo "DIST_DIR = {{.DIST_DIR}}"
      - echo "TRASH_DIR = {{.TRASH_DIR}}"
      - echo "VERSION = {{.VERSION}}"
      - echo "BUILD_TIME = {{.BUILD_TIME}}"
      - echo "GIT_COMMIT = {{.GIT_COMMIT}}"
      - echo "LDFLAGS = {{.LDFLAGS}}"
      - echo "BUILD_FLAGS = {{.BUILD_FLAGS}}"
      - echo "GOCMD = {{.GOCMD}}"
      - echo "GOOS = {{.GOOS}}"
      - echo "GOARCH = {{.GOARCH}}"
      - echo "BINARY_NAME = {{.BINARY_NAME}}"
      - echo "BINARY_PATH = {{.BINARY_PATH}}"

  architecture-check:
    desc: Run architecture compliance checks (SOLID, DRY, interfaces)
    deps: [install-deps]
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Running architecture compliance checks..."'
      - cmd: '{{.GOTEST}} -v ./tests/architecture/ -run TestManagersUseOnlyInterfaces'
      - cmd: '{{.GOTEST}} -v ./tests/architecture/ -run TestManagersCommunicateViaInterfaces'
      - cmd: '{{.GOTEST}} -v ./tests/architecture/ -run TestFolderStructureCompliance'
      - cmd: '{{.GOTEST}} -v ./tests/architecture/ -run TestUnitTestsColocated'
      - cmd: '{{.GOTEST}} -v ./tests/architecture/ -run TestInterfacesInManagerRoot'
      - cmd: '{{.GOTEST}} -v ./tests/architecture/ -run TestNoCircularDependencies'
      - cmd: 'echo "✓ All architecture checks completed successfully"'

  integration-tests:
    desc: Run integration tests (real binary, real filesystem)
    deps: [build]
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Running integration tests..."'
      - cmd: '{{.GOTEST}} -v -timeout 30m ./tests/integration/...'
      - cmd: 'echo "✓ All integration tests completed successfully"'

  integration-tests-init:
    desc: Run only init integration tests
    deps: [build]
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Running init integration tests..."'
      - cmd: '{{.GOTEST}} -v -timeout 10m ./tests/integration/init/...'
      - cmd: 'echo "✓ Init integration tests completed successfully"'

  integration-tests-cli:
    desc: Run only CLI integration tests
    deps: [build]
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: 'echo "Running CLI integration tests..."'
      - cmd: '{{.GOTEST}} -v ./tests/integration/cli/...'
      - cmd: 'echo "✓ CLI integration tests completed successfully"'

  clean:
    desc: Clean test artifacts, temporary files and binaries
    cmds:
      - cmd: 'echo "Cleaning test artifacts and binaries..."'
      - task: clean-dir
        vars:
          PATH: "{{.TRASH_DIR}}"
      - task: clean-dir
        vars:
          PATH: "{{.BIN_DIR}}"
      - task: clean-dir
        vars:
          PATH: "{{.DIST_DIR}}"
      - cmd: 'echo "Artifacts cleaned"'

  build-all:
    desc: Build binaries for all supported platforms
    deps: [install-deps]
    cmds:
      - cmd: 'echo "Building {{.APP_NAME}} for all platforms..."'
      - task: create-dir
        vars:
          PATH: "{{.DIST_DIR}}"
      - task: build-platform
        vars:
          GOOS: linux
          GOARCH: amd64
      - task: build-platform
        vars:
          GOOS: linux
          GOARCH: arm64
      - task: build-platform
        vars:
          GOOS: darwin
          GOARCH: amd64
      - task: build-platform
        vars:
          GOOS: darwin
          GOARCH: arm64
      - task: build-platform
        vars:
          GOOS: windows
          GOARCH: amd64
      - task: build-platform
        vars:
          GOOS: windows
          GOARCH: arm64
      - cmd: 'echo "All binaries built successfully in {{.DIST_DIR}}/"'

  prepare-development-environment:
    desc: Install all Go development tools (LSP, debugger, linters, formatters, testing tools, Git hooks)
    cmds:
      - echo "Installing Go dependencies..."
      - task: install-go-dependencies
      - echo "Installing Go development tools..."
      - task: install-go-gopls
      - echo "Installing delve debugger..."
      - task: install-go-delve
      - echo "Installing staticcheck..."
      - task: install-go-staticcheck
      - echo "Installing goimports..."
      - task: install-go-goimports
      - echo "Installing golangci-lint..."
      - task: install-go-golangci-lint
      - echo "Installing govulncheck..."
      - task: install-go-govulncheck
      - echo "Installing tparse..."
      - task: install-go-tparse
      - echo "Configuring Git hooks..."
      - task: configure-git-hooks
      - echo "Development environment prepared successfully"

  install-go-dependencies:
    internal: true
    dir: "{{.GO_DIR}}"
    cmds:
      - cmd: '{{.GOMOD}} download'
      - cmd: '{{.GOMOD}} tidy'

  install-go-govulncheck:
    internal: true
    cmds:
      - cmd: '{{.GOCMD}} install golang.org/x/vuln/cmd/govulncheck@latest'

  install-go-tparse:
    internal: true
    cmds:
      - cmd: '{{.GOCMD}} install github.com/mfridman/tparse@latest'

  install-go-gopls:
    internal: true
    cmds:
      - cmd: 'CGO_ENABLED=1 {{.GOCMD}} install golang.org/x/tools/gopls@latest'

  install-go-delve:
    internal: true
    cmds:
      - cmd: 'CGO_ENABLED=1 {{.GOCMD}} install github.com/go-delve/delve/cmd/dlv@latest'
        platforms: [linux, darwin]
      - cmd: 'CGO_ENABLED=1 {{.GOCMD}} install github.com/go-delve/delve/cmd/dlv@latest'
        platforms: [windows/amd64]
      - cmd: 'echo "Warning: Delve debugger is not supported on Windows ARM64, skipping installation"'
        platforms: [windows/arm64]

  install-go-staticcheck:
    internal: true
    cmds:
      - cmd: 'CGO_ENABLED=0 {{.GOCMD}} install honnef.co/go/tools/cmd/staticcheck@latest'

  install-go-goimports:
    internal: true
    cmds:
      - cmd: 'CGO_ENABLED=0 {{.GOCMD}} install golang.org/x/tools/cmd/goimports@latest'

  install-go-golangci-lint:
    internal: true
    cmds:
      - cmd: 'CGO_ENABLED=0 {{.GOCMD}} install github.com/golangci/golangci-lint/cmd/golangci-lint@latest'

  configure-git-hooks:
    internal: true
    cmds:
      - cmd: git config core.hooksPath .githooks
      - task: ensure-git-hooks-executable

  ensure-git-hooks-executable:
    internal: true
    cmds:
      - cmd: powershell -Command "if (Test-Path '.githooks') { Get-ChildItem '.githooks' -File | ForEach-Object { icacls $_.FullName /grant *S-1-5-32-545:RX | Out-Null } }"
        platforms: [windows]
      - cmd: '[ -d .githooks ] && chmod +x .githooks/* || true'
        platforms: [linux, darwin]

  create-dir:
    internal: true
    cmds:
      - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path '{{.PATH | replace "'" "''"}}' | Out-Null"
        platforms: [windows]
      - cmd: mkdir -p {{.PATH}}
        platforms: [linux, darwin]

  clean-dir:
    internal: true
    cmds:
      - cmd: powershell -Command "if (Test-Path '{{.PATH | replace "'" "''"}}') { Get-ChildItem -LiteralPath '{{.PATH | replace "'" "''"}}' -Force | Remove-Item -Recurse -Force }"
        platforms: [windows]
      - cmd: '[ -d {{.PATH}} ] && rm -rf {{.PATH}}/* || true'
        platforms: [linux, darwin]

  build-platform:
    internal: true
    vars:
      TARGET_EXT: '{{if eq .GOOS "windows"}}.exe{{end}}'
    cmds:
      - cmd: 'echo "Building for {{.GOOS}}/{{.GOARCH}}..."'
      - task: create-dir
        vars:
          PATH: "{{.DIST_DIR}}/{{.APP_NAME}}-{{.GOOS}}-{{.GOARCH}}"
      - cmd: '{{.GOCMD}} build {{.BUILD_FLAGS}} -o ../{{.DIST_DIR}}/{{.APP_NAME}}-{{.GOOS}}-{{.GOARCH}}/{{.APP_NAME}}{{.TARGET_EXT}} {{.CMD_DIR}}'
        dir: "{{.GO_DIR}}"
        env:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"
