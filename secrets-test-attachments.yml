# Test file for attachments feature
profile: "test_attachments"
default_environment: "development"

---
# Testing attachments
development:
  # Entry with attachment fields
  - name: "CONFIG_FILE"
    type: "text"
    entry: "APP_CONFIG"
    key: "attachments/config.json"
  
  - name: "SSH_KEY"
    type: "text"
    entry: "SSH_KEYS"
    key: "attachments/id_rsa"
  
  # Entry with mixed fields (regular + attachment)
  - name: "DB_PASSWORD"
    type: "envvar"
    entry: "DATABASE"
    key: "Password"
  
  - name: "DB_CERT"
    type: "text"
    entry: "DATABASE"
    key: "attachments/server.crt"
  
  # Nested entry with attachment
  - name: "API_CERT"
    type: "text"
    entry: "/api/credentials/API_SERVICE"
    key: "attachments/api_cert.pem"

production:
  # Test attachment in different environment
  - name: "PROD_CONFIG"
    type: "text"
    entry: "PROD_APP"
    key: "attachments/production.yaml"

---
# Reserved section
